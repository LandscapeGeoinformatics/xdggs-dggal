name: Tests

on:
  pull_request:

jobs:
  test:
    # dggal wheels currently only work on Linux; add more runners once upstream fixes macOS/Windows.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: dev
          cache: true

      - name: Run tests
        run: pixi run --environment dev test
